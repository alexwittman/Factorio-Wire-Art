<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Live-Updating Python WASM String Art</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .workspace {
            max-width: 950px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }

        input,
        button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button {
            background: #4f46e5;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
        }

        button:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        .render-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background: #000;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        #statusLog {
            color: #38bdf8;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
            text-align: center;
        }

        /* Export Box Styles */
        .export-box {
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #4f46e5;
            width: 100%;
            box-sizing: border-box;
            display: none;
        }

        .export-box h4 {
            margin: 0 0 10px 0;
            color: #38bdf8;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .export-btn {
            background: #10b981;
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="workspace">
        <div class="control-panel">
            <h3>Engine Tuning Adjustments</h3>
            <label>Select Target Image</label>
            <input type="file" id="imageLoader" accept="image/*">

            <label>Loom Pin Counts</label>
            <input type="number" id="numPins" value="200">

            <label>Max Line Allocation Paths</label>
            <input type="number" id="numLines" value="1000">

            <label>Thread Line Weight Opacity</label>
            <input type="number" id="lineWeight" value="0.05" step="0.01">

            <button id="triggerBtn" disabled>Loading Environment...</button>

            <div id="exportPanel" class="export-box">
                <h4>✨ Generation Complete!</h4>
                <div class="btn-group">
                    <a id="downloadPng" class="export-btn" href="#">Download PNG</a>
                    <a id="downloadSvg" class="export-btn" href="#">Download SVG</a>
                </div>
            </div>
        </div>

        <div class="render-area">
            <div id="statusLog">Initializing Environment Libraries...</div>
            <progress id="progressBar" value="0" max="100" style="width: 100%; margin-bottom: 15px;"></progress>
            <canvas id="mainLoomCanvas" width="1005" height="1005"></canvas>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
